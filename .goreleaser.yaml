---
# yamllint disable-line rule:line-length
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

project_name: afon

changelog:
  disable: true

builds:
  - id: afon
    main: ./cmd/afon/main.go
    binary: afon
    mod_timestamp: '{{ .CommitTimestamp }}'
    env:
      - CGO_ENABLED=0
    ldflags: >-
      -s -w
      -X 'main.Branch={{ .Branch }}'
      -X 'main.Commit={{ .ShortCommit }}'
      -X 'main.Version={{ .Version }}'
      -X 'main.BuildDate={{ .Date }}'
      -X 'main.Architecture={{ .Runtime.Goarch }}'
    asmflags: >-
      all=-trimpath=.
    gcflags: >-
      all=-trimpath=.
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    goamd64:
      - v1
    goarm64:
      - v8.0
    ignore:
      - goos: darwin
        goarch: amd64

snapshot:
  version_template: >-
    {{incpatch .Version}}~g{{.ShortCommit}}-d{{.Now.Format "060102t1504"}}z

source:
  enabled: true
  name_template: '{{ .ProjectName }}-v{{ .Version }}-source'
  format: tar.gz

archives:
  - id: afon
    ids:
      - afon
    name_template: |-
      {{ .ProjectName }}-v{{ .Version }}-{{ tolower .Os }}-{{ tolower .Arch }}
    formats:
      - tar.gz
    builds_info:
      group: root
      owner: root
      mode: 0644
      mtime: 2006-01-02T15:04:05Z
    files:
      - LICENSE

checksum:
  name_template: checksums.txt
  algorithm: sha3-512
  ids:
    - afon

sboms:
  - id: archives
    artifacts: archive
    documents:
      - '{{ .ArtifactName }}.sbom.json'
  - id: source
    artifacts: source
    documents:
      - '{{ .ArtifactName }}.sbom.json'

signs:
  - id: checksums
    artifacts: checksum
    # Only sign when inside GitHub Workflows as the signing credentials will
    # only be available there
    # if: '{{ eq .Env.GITHUB_ACTIONS "true" }}'
    cmd: cosign
    args:
      - sign-blob
      - --bundle=${signature}
      - ${artifact}
      - --yes
    signature: ${artifact}.sigstore.json
    output: true # Enable for debugging in GitHub Workflows

release:
  disable: '{{ .IsSnapshot }}'
  github:
    owner: n3tuk
    name: afon
  target_commitish: '{{ .Commit }}'
  draft: true
  use_existing_draft: true
  mode: keep-existing
  replace_existing_artifacts: true
  extra_files:
    - glob: checksums.txt

dockers_v2:
  - id: afon
    disable: '{{ .IsSnapshot }}'
    dockerfile: Dockerfile
    ids:
      - afon
    images:
      - ghcr.io/n3tuk/afon
    tags:
      # Only tag the commit to the image as this will be build pre-release to
      # enable attestations and signing of the image in an immutable release;
      # the version tags will be added in the release step, once released.
      - '{{ .Commit }}'
    labels:
      org.opencontainers.image.name: '{{.ProjectName}}'
      org.opencontainers.image.version: '{{.Version}}'
      org.opencontainers.image.revision: '{{.FullCommit}}'
      org.opencontainers.image.description: >-
        A GitHub Action to manage downstream repository configirations using
        upstream template repositories, providing consistent and automated
        workflows for repository maintenance.
      org.opencontainers.image.source: '{{.GitURL}}'
      org.opencontainers.image.created: '{{.Date}}'
    annotations:
      project: '{{.ProjectName}}'
    platforms:
      - linux/amd64
      - linux/arm64
    sbom: true

docker_digest:
  disable: '{{ .IsSnapshot }}'
  name_template: digests.txt

docker_signs:
  - id: afon
    # Only sign when inside GitHub Workflows as the signing credentials will
    # only be available there
    # if: '{{ eq .Env.GITHUB_ACTIONS "true" }}'
    artifacts: all
    ids:
      - afon
    cmd: cosign
    args:
      - sign
      - ${artifact}
      - --yes
    output: true # Enable for debugging in GitHub Workflows

# NOTE: Investigate using syft/cosign within GoReleaser to generate and sign
#       SBOMs for the container images as well, as this is not directly
#       supported by GoReleaser at the moment.

announce:
  skip: true
