---
# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json

name: Release
run-name: >-
  Building Release ${{ github.ref_name }}

concurrency:
  # yamllint disable-line rule:line-length
  group: ${{ github.repository }}:release:${{ github.ref_name }}
  # The tag is force-pushed on every merge to main, so cancel any previous
  # in-progress build for the same tag to avoid GoReleaser conflicts when
  # updating the draft release assets.
  cancel-in-progress: true

# Triggered by a version tag push. The intended release flow is:
#   1. Commits merged to main → draft-release.yaml updates the draft release
#      with the auto-calculated version tag and release notes, then
#      force-pushes the tag to the current commit → this workflow triggers.
#   2. GoReleaser builds all artefacts and attaches them to the existing
#      draft release (use_existing_draft: true in .goreleaser.yaml), without
#      overwriting the release notes. The draft is updated on every merge to
#      main until the release is published.
#   3. When ready, a maintainer reviews the draft in the GitHub UI and
#      publishes it. Because the release is immutable, all artefacts must be
#      attached before this step — which is guaranteed by this ordering.
on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+

# No permissions by default
permissions: {}

jobs:
  release:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write # create/update draft release and upload artefacts

    steps:
      - name: Checkout the Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
          # Disable the module cache to prevent potential poisoning of the
          # build cache with malicious dependencies during the release build
          cache: false

      - name: Run GoReleaser
        # yamllint disable-line rule:line-length
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          distribution: goreleaser
          version: ~> v2
          args: >-
            release
            --clean
            --timeout 10m
